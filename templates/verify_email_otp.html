{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Verify OTP</title>

    <link rel="stylesheet"
          href="{% static 'style.css' %}">

</head>





<body>

    <div class="box">

        <h1>Verify OTP</h1>

        <p class="timer-text">

            otp expires in

            <span id="timer">

               60

            </span>

            seconds


        </p>


        {% if messages %}

            {% for message in messages %}

                <p class="msg">

                    {{ message }}

                </p>

            {% endfor %}

        {% endif %}

        <!-- VERIFY OTP -->

        <form action="/verify-email-otp/"
              method="POST">

            {% csrf_token %}

            <input type="hidden"
                   name="email"
                   value="{{ email }}">

            <input type="hidden"
                   name="name"
                   value="{{ name }}">

            <input type="text"
                   name="otp"
                   placeholder="Enter OTP"
                   required>

            <button type="submit">

                Verify OTP

            </button>

        </form>

        <!-- RESEND OTP -->

        <form action="/send-email-otp/"
              method="POST">

            {% csrf_token %}

            <input type="hidden"
                   name="email"
                   value="{{ email }}">

            <input type="hidden"
                   name="name"
                   value="{{ name }}">

            <button type="submit"
                    class="resend-btn">

                Resend OTP

            </button>

        </form>

    </div>

    <script>

window.onload = function(){

    let time = 60;

    const timer =
    document.getElementById("timer");

    const countdown =
    setInterval(function(){

        time--;

        timer.innerHTML = time;

        if(time <= 0){

            clearInterval(countdown);

            timer.innerHTML =
            "Expired";
        }

    }, 1000);

}

</script>

</body>

</html>
