{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Email OTP Login</title>

    <link rel="stylesheet"
          href="{% static 'style.css' %}">

</head>

<body>

    <div class="box">

        <h1>Email OTP Login</h1>

        {% if messages %}

            {% for message in messages %}

                <p class="msg">

                    {{ message }}

                </p>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <button type="submit">

                Send OTP

            </button>

        </form>

    </div>

</body>

</html>
